<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Fondo verde oscuro -->
  <rect width="64" height="64" rx="14" fill="#071A14"/>

  <!-- Llave inglesa (wrench) estilizada -->
  <!-- Cabeza circular de la llave -->
  <circle cx="22" cy="20" r="10" fill="none" stroke="#059669" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Agujero interior -->
  <circle cx="22" cy="20" r="4" fill="#059669" opacity="0.4"/>
  <!-- Mango de la llave -->
  <line x1="29.5" y1="27.5" x2="48" y2="50" stroke="#059669" stroke-width="5" stroke-linecap="round"/>
  <!-- Extremo del mango -->
  <circle cx="48" cy="50" r="4" fill="#059669" opacity="0.7"/>
</svg>
